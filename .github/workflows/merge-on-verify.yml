name: Merge on Verify

# Trusted side: triggered by Verify PR completion. Runs on default branch (main),
# so PR cannot tamper with this workflow. Has write token, validates the verdict
# artifact against ground truth from GitHub API, then labels / comments / archives.

on:
  workflow_run:
    workflows: ["Verify PR"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

# Serial across all merges to avoid races on origin/solutions.
concurrency:
  group: merge-on-verify
  cancel-in-progress: false

jobs:
  merge:
    name: merge
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download verdict artifact
        uses: actions/download-artifact@v4
        with:
          name: verdict
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: verdict

      - name: Checkout main scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 1

      - name: Checkout solutions
        uses: actions/checkout@v4
        with:
          ref: solutions
          path: solutions
          fetch-depth: 1

      - name: Parse + validate verdict against ground truth
        id: gt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WF_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail
          V=verdict/verdict.json
          [ -f "$V" ] || { echo "::error::no verdict artifact"; exit 1; }
          jq . "$V"

          SCHEMA=$(jq -r .schema "$V")
          [ "$SCHEMA" = "codex-golf.verdict.v2" ] || { echo "::error::bad schema: $SCHEMA"; exit 1; }

          STATUS=$(jq -r .status "$V")
          PR=$(jq -r .pr_number "$V")
          V_HEAD=$(jq -r .head_sha "$V")

          GT=$(gh api "/repos/$REPO/pulls/$PR")
          GT_HEAD=$(echo "$GT" | jq -r .head.sha)
          GT_BASE_REF=$(echo "$GT" | jq -r .base.ref)
          GT_STATE=$(echo "$GT" | jq -r .state)
          GT_AUTHOR=$(echo "$GT" | jq -r .user.login)

          [ "$GT_STATE" = "open" ]              || { echo "::error::PR not open: $GT_STATE"; exit 1; }
          [ "$GT_BASE_REF" = "solutions" ]      || { echo "::error::PR base is $GT_BASE_REF, not solutions"; exit 1; }
          [ "$GT_HEAD" = "$V_HEAD" ]            || { echo "::error::PR head sha mismatch: GT=$GT_HEAD verdict=$V_HEAD"; exit 1; }

          if [ "$WF_RUN_CONCLUSION" != "success" ] || [ "$STATUS" != "pass" ]; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "author=$GT_AUTHOR" >> "$GITHUB_OUTPUT"
          jq -r '
            "hole="    + (.hole    // "?"),
            "lang="    + (.lang    // "?"),
            "bytes="   + ((.bytes  // 0) | tostring),
            "file="    + (.file    // "?"),
            "run_url=" + (.run_url // "?")
          ' "$V" >> "$GITHUB_OUTPUT"

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create verify-pass --repo "$REPO" --color 2EA44F --description "Verification passed" || true
          gh label create verify-fail --repo "$REPO" --color D73A4A --description "Verification failed" || true
          gh label create archive-duplicate --repo "$REPO" --color B08800 --description "Answer already archived" || true

      - name: Archive answer on solutions
        if: steps.gt.outputs.result == 'pass'
        id: archive
        working-directory: solutions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERIFY_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          python3 ../main/scripts/archive_merge.py ../verdict/verdict.json

      - name: Apply archive labels + comment
        if: steps.gt.outputs.result == 'pass' && steps.archive.outputs.result == 'archived'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:    ${{ github.repository }}
          PR:      ${{ steps.gt.outputs.pr }}
          HOLE:    ${{ steps.archive.outputs.hole }}
          LANG:    ${{ steps.archive.outputs.lang }}
          BYTES:   ${{ steps.archive.outputs.bytes }}
          ID:      ${{ steps.archive.outputs.id }}
          BEST:    ${{ steps.archive.outputs.best_result }}
          PREV:    ${{ steps.archive.outputs.previous_best_bytes }}
          ARCHIVE_PATH: ${{ steps.archive.outputs.path }}
        run: |
          set -euo pipefail
          gh pr edit "$PR" --repo "$REPO" --remove-label verify-fail || true
          gh pr edit "$PR" --repo "$REPO" --remove-label archive-duplicate || true
          gh pr edit "$PR" --repo "$REPO" --add-label verify-pass || true
          if [ "$BEST" = "new_best" ]; then
            RESULT="new best (previous: ${PREV})"
          else
            RESULT="archived; best unchanged"
          fi
          gh pr comment "$PR" --repo "$REPO" \
            --body "✅ **$HOLE / $LANG** passed and archived as \`$ID\` (**${BYTES}B**): $RESULT.\n\nPath: \`$ARCHIVE_PATH\`."

      - name: Apply duplicate label + comment
        if: steps.gt.outputs.result == 'pass' && steps.archive.outputs.result == 'duplicate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:    ${{ github.repository }}
          PR:      ${{ steps.gt.outputs.pr }}
          HOLE:    ${{ steps.archive.outputs.hole }}
          LANG:    ${{ steps.archive.outputs.lang }}
          ID:      ${{ steps.archive.outputs.id }}
        run: |
          set -euo pipefail
          gh pr edit "$PR" --repo "$REPO" --remove-label verify-pass || true
          gh pr edit "$PR" --repo "$REPO" --add-label archive-duplicate || true
          gh pr comment "$PR" --repo "$REPO" \
            --body "⚠️ **$HOLE / $LANG** already archived as \`$ID\`. No solutions change was made."
          gh pr close "$PR" --repo "$REPO" || true

      - name: Apply fail label + comment
        if: steps.gt.outputs.result == 'fail'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:    ${{ github.repository }}
          PR:      ${{ steps.gt.outputs.pr }}
          RUN_URL: ${{ steps.gt.outputs.run_url }}
        run: |
          set -euo pipefail
          gh pr edit "$PR" --repo "$REPO" --remove-label verify-pass || true
          gh pr edit "$PR" --repo "$REPO" --remove-label archive-duplicate || true
          gh pr edit "$PR" --repo "$REPO" --add-label verify-fail || true
          gh pr comment "$PR" --repo "$REPO" \
            --body "❌ Verification failed. See run log: $RUN_URL"
