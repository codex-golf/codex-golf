name: Reverify all

# Periodically re-verify every archived entry in solutions/answers/ against
# current upstream judging code.

on:
  schedule:
    - cron: "0 4 * * 0"   # weekly, Sunday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # for opening regression report

concurrency:
  group: reverify-all
  cancel-in-progress: true

jobs:
  reverify:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout solutions answers
        uses: actions/checkout@v4
        with:
          ref: solutions
          path: solutions
          fetch-depth: 1

      - name: Checkout main verifier
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 1

      - name: Resolve upstream lock
        id: upstream-lock
        run: |
          set -euo pipefail
          REF="$(awk '$1 == "upstream_ref" { print $2 }' main/verify/VERIFY_LOCK)"
          if ! printf '%s\n' "$REF" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::invalid upstream_ref in VERIFY_LOCK: $REF"
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream mirror
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.upstream-lock.outputs.ref }}
          path: upstream
          fetch-depth: 1

      - name: Reverify every archived answer
        id: run
        run: |
          set -euo pipefail
          chmod +x main/verify/run.sh
          python3 main/scripts/reverify_archive.py solutions main upstream /tmp/regressions.md

      - name: File regression issue
        if: steps.run.outputs.fail != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PASS: ${{ steps.run.outputs.pass }}
          FAIL: ${{ steps.run.outputs.fail }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create reverify-regression --repo "$REPO" --color D73A4A --description "Archived answer failed reverify" || true
          {
            echo "## Regressions"
            echo
            echo "Reverify run found **${FAIL}** failure(s) out of $((PASS+FAIL)) entries."
            echo "[Run log]($RUN_URL)"
            echo
            cat /tmp/regressions.md
          } > /tmp/issue_body.md

          gh issue create \
            --repo "$REPO" \
            --title "Reverify regressions: $FAIL failure(s) on $(date -u +%Y-%m-%d)" \
            --label reverify-regression \
            --body-file /tmp/issue_body.md

      - name: Fail on regressions
        if: steps.run.outputs.fail != '0'
        run: |
          echo "::error::Reverify found ${{ steps.run.outputs.fail }} regression(s)."
          exit 1
