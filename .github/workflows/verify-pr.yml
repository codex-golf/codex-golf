name: Verify PR

on:
  pull_request:
    branches: [solutions]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "answers/**"

# Untrusted side: read-only token. Just verify and emit a verdict artifact.
# Actual labelling / commenting / archiving happens in merge-on-verify.yml on main.
permissions:
  contents: read
  pull-requests: read

# Verify itself can run in parallel safely; merge side serialises.
concurrency:
  group: verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout main verifier
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve upstream lock
        id: upstream-lock
        run: |
          set -euo pipefail
          REF="$(tr -d '[:space:]' < main/UPSTREAM_REF)"
          if ! printf '%s\n' "$REF" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::invalid UPSTREAM_REF: $REF"
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream mirror
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.upstream-lock.outputs.ref }}
          path: upstream
          fetch-depth: 1
          persist-credentials: false

      - name: Validate changed file
        id: scan
        working-directory: pr
        run: |
          set -euo pipefail

          BASE='${{ github.event.pull_request.base.sha }}'
          HEAD='${{ github.event.pull_request.head.sha }}'

          git fetch origin "$BASE" --depth=1 || true
          ALL="$(git diff --name-only "$BASE" "$HEAD")"

          if [ -z "$ALL" ]; then
            echo "::error::PR changes nothing"
            exit 1
          fi

          COUNT="$(printf '%s\n' "$ALL" | wc -l | tr -d ' ')"
          if [ "$COUNT" != "1" ]; then
            echo "::error::PR must change exactly one file, found $COUNT:"
            printf '%s\n' "$ALL" | sed 's/^/  - /'
            exit 1
          fi

          F="$ALL"
          if ! printf '%s\n' "$F" | grep -qE '^answers/[a-z0-9-]+/[a-z0-9-]+/answer\.[a-z0-9]+$'; then
            echo "::error::changed file must be answers/<hole>/<lang>/answer.<ext>, got: $F"
            exit 1
          fi

          STATUS="$(git diff --name-status "$BASE" "$HEAD" -- "$F" | awk '{print $1}')"
          case "$STATUS" in
            A|M) ;;
            *)
              echo "::error::answer file must be added or modified, got status: $STATUS"
              exit 1
              ;;
          esac

          COMMITS="$(git rev-list --count "$BASE..$HEAD")"
          if [ "$COMMITS" -gt 5 ]; then
            echo "::error::PR has $COMMITS commits; please squash to <= 5"
            exit 1
          fi

          HOLE="$(printf '%s\n' "$F" | cut -d/ -f2)"
          LANG="$(printf '%s\n' "$F" | cut -d/ -f3)"
          EXT="${F##*.}"

          echo "file=$F"   >> "$GITHUB_OUTPUT"
          echo "hole=$HOLE" >> "$GITHUB_OUTPUT"
          echo "lang=$LANG" >> "$GITHUB_OUTPUT"
          echo "ext=$EXT"   >> "$GITHUB_OUTPUT"
          python3 - "$F" >> "$GITHUB_OUTPUT" <<'PY'
          import hashlib, sys
          path = sys.argv[1]
          data = open(path, 'rb').read()
          digest = hashlib.sha256(data).hexdigest()
          print(f"bytes={len(data)}")
          print(f"chars={len(data.decode('utf-8', 'replace'))}")
          print(f"sha256={digest}")
          print(f"id={digest[:16]}")
          PY

      - name: Verify answer
        id: run
        env:
          HOLE: ${{ steps.scan.outputs.hole }}
          LANG: ${{ steps.scan.outputs.lang }}
          FILE: ${{ steps.scan.outputs.file }}
        run: |
          set -euo pipefail
          chmod +x main/verify/run.sh
          set +e
          main/verify/run.sh "$HOLE" "$LANG" "pr/$FILE" "upstream" > /tmp/verify.out 2> /tmp/verify.err
          RC=$?
          set -e
          echo "=== verify stdout ==="
          cat /tmp/verify.out
          echo "=== verify stderr ==="
          cat /tmp/verify.err
          echo "=== verify exit: $RC ==="
          if [ "$RC" != 0 ]; then
            echo "::error::verify/run.sh failed (exit $RC)"
            exit "$RC"
          fi
          BYTES="$(awk '/^PASS /{print $2}' /tmp/verify.out)"
          if [ -z "$BYTES" ]; then
            echo "::error::verify/run.sh did not emit PASS <bytes>"
            exit 1
          fi
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"

      - name: Check duplicate archive
        id: dup
        working-directory: pr
        env:
          HOLE:   ${{ steps.scan.outputs.hole }}
          LANG:   ${{ steps.scan.outputs.lang }}
          SHA256: ${{ steps.scan.outputs.sha256 }}
        run: |
          set -euo pipefail
          git fetch origin solutions --depth=1
          set +e
          git show "origin/solutions:answers/$HOLE/$LANG/index.json" > /tmp/index.json 2>/dev/null
          RC=$?
          set -e
          if [ "$RC" = 0 ]; then
            python3 - "$SHA256" /tmp/index.json <<'PY'
            import json, sys
            sha = sys.argv[1]
            index = json.load(open(sys.argv[2]))
            for entry in index.get('entries', []):
                if entry.get('sha256') == sha:
                    print(f"::error::answer already archived as {entry.get('id')}")
                    sys.exit(1)
            PY
          fi

      - name: Emit verdict (success)
        if: success()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA:  ${{ github.event.pull_request.head.sha }}
          BASE_SHA:  ${{ github.event.pull_request.base.sha }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REF:  ${{ github.event.pull_request.base.ref }}
          AUTHOR:    ${{ github.event.pull_request.user.login }}
          FILE:      ${{ steps.scan.outputs.file }}
          HOLE:      ${{ steps.scan.outputs.hole }}
          LANG:      ${{ steps.scan.outputs.lang }}
          EXT:       ${{ steps.scan.outputs.ext }}
          BYTES:     ${{ steps.run.outputs.bytes }}
          CHARS:     ${{ steps.scan.outputs.chars }}
          SHA256:    ${{ steps.scan.outputs.sha256 }}
          ID:        ${{ steps.scan.outputs.id }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p verdict
          cat > verdict/verdict.json <<JSON
          {
            "schema": "codex-golf.verdict.v2",
            "status": "pass",
            "pr_number": ${PR_NUMBER},
            "head_sha":  "${HEAD_SHA}",
            "base_sha":  "${BASE_SHA}",
            "head_repo": "${HEAD_REPO}",
            "base_ref":  "${BASE_REF}",
            "author":    "${AUTHOR}",
            "file":      "${FILE}",
            "hole":      "${HOLE}",
            "lang":      "${LANG}",
            "ext":       "${EXT}",
            "bytes":     ${BYTES},
            "chars":     ${CHARS},
            "sha256":    "${SHA256}",
            "id":        "${ID}",
            "run_url":   "${RUN_URL}"
          }
          JSON
          cat verdict/verdict.json

      - name: Emit verdict (failure)
        if: failure()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA:  ${{ github.event.pull_request.head.sha }}
          AUTHOR:    ${{ github.event.pull_request.user.login }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p verdict
          cat > verdict/verdict.json <<JSON
          {
            "schema": "codex-golf.verdict.v2",
            "status": "fail",
            "pr_number": ${PR_NUMBER},
            "head_sha":  "${HEAD_SHA}",
            "author":    "${AUTHOR}",
            "run_url":   "${RUN_URL}"
          }
          JSON
          cat verdict/verdict.json

      - name: Upload verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verdict
          path: verdict/verdict.json
          retention-days: 7
